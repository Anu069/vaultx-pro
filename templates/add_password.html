{% extends "base.html" %}
{% block title %}VaultX — Add Credential{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:700px">
  <h2 class="vx-page-title mb-1"><i class="bi bi-plus-circle-fill me-2"></i>Add Credential</h2>
  <p class="vx-page-sub mb-4">Encrypted & saved securely. Email notification will be sent.</p>
  <div class="vx-card">
    <form method="POST" autocomplete="off">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="vx-lbl">Website / Service</label>
          <div class="vx-ig"><span class="vx-ii"><i class="bi bi-globe2"></i></span>
          <input type="text" name="website" class="vx-inp" placeholder="e.g. github.com" required/></div>
        </div>
        <div class="col-md-6">
          <label class="vx-lbl">Category</label>
          <select name="category" class="vx-select w-100">
            {% for c in categories %}<option>{{ c }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="vx-lbl">Username / Email</label>
          <div class="vx-ig"><span class="vx-ii"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="vx-inp" placeholder="username or email" required/></div>
        </div>
        <div class="col-md-6">
          <label class="vx-lbl">Password</label>
          <div class="vx-ig"><span class="vx-ii"><i class="bi bi-key-fill"></i></span>
          <input type="password" name="password" id="newPw" class="vx-inp" placeholder="Enter or generate" required oninput="liveStr(this.value)"/>
          <button type="button" class="vx-eye" onclick="toggleVis('newPw',this)"><i class="bi bi-eye-fill"></i></button></div>
        </div>
      </div>

      <!-- Strength -->
      <div id="strWrap" class="mt-3" style="display:none">
        <div class="vx-str-track"><div class="vx-str-bar" id="strBar"></div></div>
        <div class="d-flex justify-content-between mt-1">
          <span class="vx-str-lbl" id="strLbl"></span>
          <ul class="vx-str-tips" id="strTips"></ul>
        </div>
      </div>

      <!-- Generator -->
      <div class="vx-gen-box mt-3">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <span class="vx-gen-title"><i class="bi bi-lightning-charge-fill me-1"></i>Password Generator</span>
          <div class="d-flex align-items-center gap-2">
            <input type="range" id="genLen" min="8" max="32" value="16" class="vx-range"
                   oninput="document.getElementById('lenVal').textContent=this.value"/>
            <span class="vx-len-badge" id="lenVal">16</span>
          </div>
        </div>
        <button type="button" class="vx-btn-gold w-100" onclick="genPw()">
          <i class="bi bi-arrow-repeat me-2"></i>Generate Strong Password
        </button>
      </div>

      <div class="mt-3">
        <label class="vx-lbl">Notes <small class="text-muted">(optional)</small></label>
        <textarea name="notes" class="vx-textarea" rows="2" placeholder="e.g. Work account, 2FA enabled…"></textarea>
      </div>

      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="vx-btn-primary flex-fill"><i class="bi bi-shield-check-fill me-2"></i>Save Credential</button>
        <a href="{{ url_for('dashboard') }}" class="vx-btn-ghost flex-fill text-center">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function liveStr(pw) {
  const w=document.getElementById('strWrap');
  if(!pw){w.style.display='none';return;}
  w.style.display='block';
  const d=await(await fetch('/api/check-strength',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})})).json();
  const bar=document.getElementById('strBar'), lbl=document.getElementById('strLbl'), tips=document.getElementById('strTips');
  bar.style.width=(d.score/6*100)+'%';
  const cls='vx-s-'+d.level.toLowerCase().replace(' ','');
  bar.className='vx-str-bar '+cls; lbl.className='vx-str-lbl '+cls; lbl.textContent=d.level;
  tips.innerHTML=d.feedback.map(f=>`<li>${f}</li>`).join('');
}
async function genPw(){
  const len=document.getElementById('genLen').value;
  const d=await(await fetch(`/api/generate-password?length=${len}`)).json();
  const inp=document.getElementById('newPw'); inp.type='text'; inp.value=d.password; liveStr(d.password);
}
</script>
{% endblock %}
