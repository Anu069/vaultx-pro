{% extends "base.html" %}
{% block title %}VaultX — Register{% endblock %}
{% block content %}
<div class="vx-auth-wrap">
  <div class="vx-auth-bg-fx"></div>
  <div class="vx-auth-card">
    <div class="vx-auth-logo"><i class="bi bi-shield-plus-fill"></i></div>
    <h1 class="vx-auth-title">Create Account</h1>
    <p class="vx-auth-sub">Join VaultX — Your secure digital vault</p>
    <form method="POST" class="mt-4" autocomplete="off">
      <div class="mb-3">
        <label class="vx-lbl">Username</label>
        <div class="vx-ig"><span class="vx-ii"><i class="bi bi-person-fill"></i></span>
        <input type="text" name="username" class="vx-inp" placeholder="Choose a username" required autofocus/></div>
      </div>
      <div class="mb-3">
        <label class="vx-lbl">Email Address</label>
        <div class="vx-ig"><span class="vx-ii"><i class="bi bi-envelope-fill"></i></span>
        <input type="email" name="email" class="vx-inp" placeholder="your@email.com" required/></div>
      </div>
      <div class="mb-4">
        <label class="vx-lbl">Password</label>
        <div class="vx-ig"><span class="vx-ii"><i class="bi bi-key-fill"></i></span>
        <input type="password" name="password" id="regPw" class="vx-inp" placeholder="Create a strong password" required/>
        <button type="button" class="vx-eye" onclick="toggleVis('regPw',this)"><i class="bi bi-eye-fill"></i></button></div>
      </div>
      <button type="submit" class="vx-btn-primary w-100"><i class="bi bi-shield-check-fill me-2"></i>Create Account</button>
    </form>
    <p class="vx-auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
